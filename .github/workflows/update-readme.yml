name: Update backtest README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backtest and update README
        run: python run_all.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update point-in-time Nasdaq-100 momentum backtest"
          file_pattern: "README.md data/*.csv output/*.csv"
